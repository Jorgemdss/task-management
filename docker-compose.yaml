services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskmanagement-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=MyStrongP@ssw0rd123!
      - MSSQL_PID=Developer
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P MyStrongP@ssw0rd123! -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - taskmanagement-network

  api:
    build:
      context: .
      dockerfile: TaskManagement.Api/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    container_name: taskmanagement-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=TaskManagementDb;User Id=sa;Password=MyStrongP@ssw0rd123!;TrustServerCertificate=True;
    ports:
      - "5000:80"
    networks:
      - taskmanagement-network
    volumes:
      - ./logs:/app/logs
    restart: on-failure

networks:
  taskmanagement-network:
    driver: bridge

volumes:
  sqlserver-data: